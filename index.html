<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Four Pillars Oracle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-card: #0f3460;
  --accent-gold: #C9A84C;
  --accent-gold-light: #e8c97a;
  --text-primary: #f5f0e8;
  --text-muted: #8a8a9a;
  --wood: #4ade80;
  --fire: #f87171;
  --earth: #d97706;
  --metal: #e2e8f0;
  --water: #60a5fa;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}
/* HEADER */
.site-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(26,26,46,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo-area { display: flex; align-items: center; gap: 8px; }
.logo-area span.icon { font-size: 22px; }
.logo-area span.title { font-size: 15px; font-weight: 700; color: var(--accent-gold); }
.lang-toggle { display: flex; gap: 4px; }
.lang-toggle button {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-muted);
  font-size: 11px; padding: 4px 8px;
  border-radius: 6px; cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans KR', sans-serif;
}
.lang-toggle button.active {
  background: rgba(201,168,76,0.2);
  border-color: var(--accent-gold);
  color: var(--accent-gold);
}
/* HERO */
.hero {
  text-align: center;
  padding: 48px 20px 32px;
}
.hero h1 {
  font-size: 28px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light), var(--accent-gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.hero p { color: var(--text-muted); font-size: 14px; }
/* FORM */
.form-section {
  max-width: 480px; margin: 0 auto; padding: 0 16px 32px;
}
.form-card {
  background: rgba(15,52,96,0.5);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 16px; padding: 24px;
}
.form-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
  margin-bottom: 12px;
}
.form-grid-2 {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-bottom: 16px;
}
.form-group label {
  display: block; font-size: 12px; color: var(--text-muted);
  margin-bottom: 6px;
}
.form-group input, .form-group select {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 10px 12px;
  color: var(--text-primary); font-size: 15px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--accent-gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
}
.form-group select option { background: var(--bg-secondary); }
.btn-calc {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent-gold), #b8943f);
  border: none; border-radius: 12px;
  color: #1a1a2e; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.25s;
  font-family: 'Noto Sans KR', sans-serif;
  letter-spacing: 1px;
}
.btn-calc:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(201,168,76,0.4); }
/* CHART SECTION */
#chartSection { display: none; max-width: 720px; margin: 0 auto; padding: 0 16px 32px; }
#chartSection.show { display: block; }
/* PILLAR GRID */
.pillar-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; margin-bottom: 24px;
}
.pillar-col {
  background: rgba(15,52,96,0.6);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 16px 8px;
  text-align: center;
  opacity: 0; transform: translateY(-20px);
  animation: dropIn 0.4s ease forwards;
}
.pillar-col:nth-child(1) { animation-delay: 0ms; }
.pillar-col:nth-child(2) { animation-delay: 200ms; }
.pillar-col:nth-child(3) { animation-delay: 400ms; }
.pillar-col:nth-child(4) { animation-delay: 600ms; }
@keyframes dropIn {
  to { opacity: 1; transform: translateY(0); }
}
.pillar-col.day-pillar {
  border-color: var(--accent-gold);
  box-shadow: 0 0 0 2px var(--accent-gold), inset 0 0 20px rgba(201,168,76,0.08);
}
.pillar-label { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; letter-spacing: 1px; }
.stem-char {
  font-size: 2.5rem; font-weight: 700; line-height: 1;
  text-shadow: 0 0 12px currentColor;
}
.elem-badge {
  font-size: 11px; margin: 4px 0;
  display: inline-block; padding: 2px 8px;
  border-radius: 8px; background: rgba(255,255,255,0.06);
}
.branch-char { font-size: 2.5rem; font-weight: 700; line-height: 1; margin: 4px 0; }
.elem-emoji { font-size: 18px; margin: 4px 0; }
.yinyang-label { font-size: 11px; color: var(--text-muted); }
.shishen-label { font-size: 11px; color: var(--accent-gold); margin-top: 6px; cursor: pointer; }
.shishen-label:hover { text-decoration: underline; }
/* RADAR */
.radar-section {
  text-align: center; margin-bottom: 24px;
  background: rgba(15,52,96,0.4);
  border-radius: 16px; padding: 20px;
  border: 1px solid rgba(255,255,255,0.06);
}
.radar-section h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
/* DAY MASTER */
.daymaster-card {
  background: linear-gradient(135deg, rgba(15,52,96,0.7), rgba(201,168,76,0.08));
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 16px; padding: 20px; margin-bottom: 24px;
}
.daymaster-card h3 { color: var(--accent-gold); font-size: 16px; margin-bottom: 8px; }
.daymaster-card p { font-size: 14px; color: var(--text-primary); line-height: 1.8; }
/* UNLOCK BANNER */
.unlock-banner {
  background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.08));
  border: 1px solid var(--accent-gold);
  border-radius: 16px; padding: 20px; margin-bottom: 24px;
  text-align: center;
  animation: bannerPulse 2s ease-in-out infinite;
  cursor: pointer;
}
@keyframes bannerPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.3); }
  50% { box-shadow: 0 0 20px 4px rgba(201,168,76,0.15); }
}
.unlock-banner h3 { color: var(--accent-gold); font-size: 16px; margin-bottom: 6px; }
.unlock-banner p { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }
.unlock-banner .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn-apikey, .btn-premium {
  padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700;
  cursor: pointer; border: none; font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
}
.btn-apikey {
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--accent-gold);
  color: var(--accent-gold);
}
.btn-apikey:hover { background: rgba(201,168,76,0.15); }
.btn-premium {
  background: linear-gradient(135deg, var(--accent-gold), #b8943f);
  color: #1a1a2e;
}
.btn-premium:hover { transform: translateY(-1px); }
/* TABS */
.tabs-bar {
  display: flex; gap: 0; margin-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  overflow-x: auto;
}
.tab-btn {
  flex: 1; min-width: 0;
  padding: 10px 8px; font-size: 12px; font-weight: 700;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-muted); cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  white-space: nowrap; transition: all 0.2s;
}
.tab-btn.active {
  color: var(--accent-gold);
  border-bottom-color: var(--accent-gold);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }
/* DAEUN TIMELINE */
.daeun-timeline {
  display: flex; gap: 10px; overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding-bottom: 12px;
  -webkit-overflow-scrolling: touch;
}
.daeun-timeline::-webkit-scrollbar { height: 4px; }
.daeun-timeline::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 4px; }
.daeun-block {
  min-width: 90px; flex-shrink: 0;
  scroll-snap-align: start;
  background: rgba(15,52,96,0.5);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 12px 10px;
  text-align: center;
}
.daeun-block.current {
  border-color: var(--accent-gold);
  background: rgba(201,168,76,0.1);
}
.daeun-block .age { font-size: 11px; color: var(--text-muted); }
.daeun-block .chars { font-size: 20px; font-weight: 700; margin: 6px 0; }
.daeun-block .label-current { font-size: 10px; color: var(--accent-gold); font-weight: 700; }
/* LOCKED ITEMS */
.locked-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; padding: 14px;
  text-align: center; margin-top: 12px;
  cursor: pointer; transition: all 0.2s;
}
.locked-item:hover { border-color: var(--accent-gold); }
.locked-item p { color: var(--accent-gold); font-size: 13px; }
/* AI SECTION */
.ai-section {
  background: rgba(15,52,96,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 20px; margin-bottom: 24px;
  position: relative; overflow: hidden;
}
.ai-section.locked .ai-content {
  filter: blur(6px); pointer-events: none; user-select: none;
}
.ai-section .lock-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(26,26,46,0.7);
  z-index: 2;
}
.ai-section .lock-overlay .lock-icon { font-size: 36px; margin-bottom: 12px; }
.ai-section .lock-overlay h4 { color: var(--accent-gold); font-size: 15px; margin-bottom: 6px; }
.ai-section .lock-overlay p { color: var(--text-muted); font-size: 12px; text-align: center; max-width: 260px; margin-bottom: 14px; }
.ai-content h4 { color: var(--accent-gold); margin-bottom: 8px; }
.ai-content p { font-size: 14px; line-height: 1.8; margin-bottom: 10px; }
.ai-content .strengths, .ai-content .challenges { margin: 8px 0; padding-left: 18px; }
.ai-content li { font-size: 13px; margin-bottom: 4px; }
/* MODALS */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100; align-items: center; justify-content: center;
  padding: 16px;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--bg-secondary);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 16px; padding: 24px;
  max-width: 400px; width: 100%;
}
.modal-box h3 { color: var(--accent-gold); font-size: 16px; margin-bottom: 6px; }
.modal-box p.desc { color: var(--text-muted); font-size: 12px; margin-bottom: 16px; }
.modal-box input {
  width: 100%; padding: 10px 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; color: var(--text-primary);
  font-size: 14px; outline: none; margin-bottom: 12px;
  font-family: 'Noto Sans KR', sans-serif;
}
.modal-box input:focus { border-color: var(--accent-gold); }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button {
  flex: 1; padding: 10px; border-radius: 10px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  border: none; transition: all 0.2s;
}
.modal-btns .btn-save {
  background: var(--accent-gold); color: #1a1a2e;
}
.modal-btns .btn-cancel {
  background: rgba(255,255,255,0.08); color: var(--text-muted);
  border: 1px solid rgba(255,255,255,0.1);
}
/* SHISHEN TABLE */
.shishen-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
.shishen-table th, .shishen-table td {
  padding: 8px; text-align: center; font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.shishen-table th { color: var(--text-muted); font-size: 11px; }
/* FOOTER */
.site-footer {
  text-align: center; padding: 24px 16px 40px;
  color: var(--text-muted); font-size: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
  max-width: 720px; margin: 0 auto;
}
.site-footer .footer-btns { display: flex; gap: 12px; justify-content: center; margin-bottom: 12px; }
.site-footer button {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-muted); font-size: 12px;
  padding: 6px 14px; border-radius: 8px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.btn-back {
  display: inline-block; margin-bottom: 20px;
  background: none; border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-muted); padding: 8px 16px;
  border-radius: 10px; font-size: 13px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.btn-back:hover { border-color: var(--accent-gold); color: var(--accent-gold); }
/* COMPAT */
.compat-form { margin-top: 12px; }
.compat-form .form-grid { margin-bottom: 8px; }
.compat-result { margin-top: 16px; text-align: center; }
.compat-score-circle {
  width: 100px; height: 100px; border-radius: 50%;
  border: 3px solid var(--accent-gold);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: var(--accent-gold);
  margin-bottom: 8px;
}
/* RESPONSIVE */
@media (min-width: 768px) {
  .hero h1 { font-size: 36px; }
  .pillar-grid { gap: 16px; }
  .stem-char, .branch-char { font-size: 3rem; }
  .form-section { max-width: 520px; }
}
/* TYPEWRITER */
.typewriter-cursor::after {
  content: '|'; color: var(--accent-gold); animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo-area">
    <span class="icon">&#9788;</span>
    <span class="title" data-i18n="appTitle">&#49324;&#51452;&#54036;&#51088; &#50724;&#46972;&#53364;</span>
  </div>
  <div class="lang-toggle" id="langToggle">
    <button data-lang="en">EN</button>
    <button data-lang="ko" class="active">&#54620;&#44397;&#50612;</button>

<!-- FOOTER -->

</footer>

<!-- API KEY MODAL -->
<div class="modal-overlay" id="apiKeyModal">
  <div class="modal-box">
    <h3 data-i18n="enterApiKeyTitle">Anthropic API &#53412; &#51077;&#47141;</h3>
    <p class="desc" data-i18n="enterApiKeyDesc">&#53412;&#45716; &#48652;&#46972;&#50864;&#51200;&#50640;&#47564; &#51200;&#51109;&#46104;&#47728; &#50808;&#48512;&#47196; &#51204;&#49569;&#46104;&#51648; &#50506;&#49845;&#45768;&#45796;</p>

<!-- SHARE MODAL -->

    <h3>Share</h3>

    <div class="modal-btns">
      <button class="btn-cancel" id="shareClose">Close</button>
      <button class="btn-save" id="shareCopy">Copy</button>
    </div>
  </div>
</div>

<script type="module">
// === SECTION A: CONSTANTS ===
const STEMS = ['\u7532','\u4E59','\u4E19','\u4E01','\u620A','\u5DF1','\u5E9A','\u8F9B','\u58EC','\u7678'];
const BRANCHES = ['\u5B50','\u4E11','\u5BC5','\u536F','\u8FB0','\u5DF3','\u5348','\u672A','\u7533','\u9149','\u620C','\u4EA5'];
const STEMS_KO = ['\uAC11','\uC744','\uBCD1','\uC815','\uBB34','\uAE30','\uACBD','\uC2E0','\uC784','\uACC4'];
const BRANCHES_KO = ['\uC790','\uCD95','\uC778','\uBBD8','\uC9C4','\uC0AC','\uC624','\uBBF8','\uC2E0','\uC720','\uC220','\uD574'];

// === SECTION B: CALCULATOR ===
function calcSolarTermDate(year, lngTarget) {
  const dayOfYear = ((lngTarget - 280.46646 + 360) % 360) / 360 * 365.25;
  let jde = 2451545.0 + (year - 2000) * 365.25 + dayOfYear;
  for (let i = 0; i < 50; i++) {
    const T = (jde - 2451545.0) / 36525;
    const M = ((357.5291092 + 35999.0502909 * T) % 360 + 360) % 360;
    const Mrad = M * Math.PI / 180;
    const L0 = 280.46646 + 36000.76983 * T;
    const C = (1.9146 - 0.004817*T) * Math.sin(Mrad)
             + 0.019994 * Math.sin(2*Mrad)
             + 0.00029 * Math.sin(3*Mrad);
    const sunLng = ((L0 + C) % 360 + 360) % 360;
    let diff = lngTarget - sunLng;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    if (Math.abs(diff) < 0.0001) break;
    jde += diff / 360 * 365.25;
  }
  const jdKST = jde + 9/24;
  const z = Math.floor(jdKST + 0.5);
  const a = z < 2299161 ? z : (()=>{const al=Math.floor((z-1867216.25)/36524.25); return z+1+al-Math.floor(al/4);})();
  const b = a + 1524;
  const c = Math.floor((b - 122.1) / 365.25);
  const d = Math.floor(365.25 * c);
  const e = Math.floor((b - d) / 30.6001);
  const day = b - d - Math.floor(30.6001 * e);
  const month = e < 14 ? e - 1 : e - 13;
  const yr = month > 2 ? c - 4716 : c - 4715;
  return { year: yr, month, day };
}

function getYearPillar(year) {
  const h = ((year - 4) % 10 + 10) % 10;
  const e = ((year - 4) % 12 + 12) % 12;
  return { h, e };
}

function getDayPillar(year, month, day) {
  const d = new Date(Date.UTC(year, month-1, day));
  const ref = new Date(Date.UTC(1900, 0, 1));
  const diff = Math.round((d - ref) / 86400000);
  const h = ((diff % 10) + 10) % 10;
  const e = (((diff + 10) % 12) + 12) % 12;
  return { h, e };
}

function getMonthPillar(year, month, day) {
  const checkYears = [year - 1, year, year + 1];
  let foundBranch = 2, foundOffset = 0, foundYear = year;
  const terms = [];
  for (const y of checkYears) {
    for (const node of JIEQI_NODES) {
      const d = calcSolarTermDate(y, node.lng);
      terms.push({ ...d, branch: node.branch, offset: node.offset, isSpring: node.lng === 315, solarYear: y });
    }
  }
  terms.sort((a, b) => {
    if (a.year !== b.year) return a.year - b.year;
    if (a.month !== b.month) return a.month - b.month;
    return a.day - b.day;
  });
  const targetDate = new Date(Date.UTC(year, month-1, day));
  for (let i = terms.length - 1; i >= 0; i--) {
    const t = terms[i];
    const tDate = new Date(Date.UTC(t.year, t.month-1, t.day));
    if (tDate <= targetDate) {
      foundBranch = t.branch;
      foundOffset = t.offset;
      for (let j = i; j >= 0; j--) {
        const tj = terms[j];
        if (tj.isSpring) {
          const tjDate = new Date(Date.UTC(tj.year, tj.month-1, tj.day));
          if (tjDate <= targetDate) {
            foundYear = tj.solarYear;
            break;
          }
        }
        if (j === 0) foundYear = terms[0].solarYear - 1;
      }
      break;
    }
  }
  const yearStemForMonth = ((foundYear - 4) % 10 + 10) % 10;
  const base = MONTH_STEM_BASES[yearStemForMonth];
  const h = (base + foundOffset) % 10;
  return { h, e: foundBranch };
}

function getHourPillar(hour, dayStemH) {
  const e = Math.floor(hour / 2) % 12;
  const bases = [0, 2, 4, 6, 8, 0, 2, 4, 6, 8];
  const base = bases[dayStemH];
  const h = (base + e) % 10;
  return { h, e };
}

function getShiShen(dayStemH, stemH) {
  const dayEl = STEM_ELEMENT[dayStemH];
  const dayYin = STEM_YIN[dayStemH];
  const stemEl = STEM_ELEMENT[stemH];
  const stemYin = STEM_YIN[stemH];
  const sameYin = dayYin === stemYin;
  if (stemEl === dayEl) return sameYin ? '\uBE44\uACAC' : '\uACA9\uC7AC';
  if (ELEM_GENERATES[dayEl] === stemEl) return sameYin ? '\uC2DD\uC2E0' : '\uC0C1\uAD00';
  if (ELEM_CONTROLS[dayEl] === stemEl) return sameYin ? '\uD3B8\uC7AC' : '\uC815\uC7AC';
  if (ELEM_GENERATES[stemEl] === dayEl) return sameYin ? '\uD3B8\uC778' : '\uC815\uC778';
  if (ELEM_CONTROLS[stemEl] === dayEl) return sameYin ? '\uD3B8\uAD00' : '\uC815\uAD00';
  return '?';
}

function getShiShenEN(dayStemH, stemH) {
  const dayEl = STEM_ELEMENT[dayStemH];
  const dayYin = STEM_YIN[dayStemH];
  const stemEl = STEM_ELEMENT[stemH];
  const stemYin = STEM_YIN[stemH];
  const sameYin = dayYin === stemYin;
  if (stemEl === dayEl) return sameYin ? 'Friend' : 'Rob Wealth';
  if (ELEM_GENERATES[dayEl] === stemEl) return sameYin ? 'Eating God' : 'Hurting Officer';
  if (ELEM_CONTROLS[dayEl] === stemEl) return sameYin ? 'Indirect Wealth' : 'Direct Wealth';
  if (ELEM_GENERATES[stemEl] === dayEl) return sameYin ? 'Indirect Seal' : 'Direct Seal';
  if (ELEM_CONTROLS[stemEl] === dayEl) return sameYin ? 'Seven Killings' : 'Direct Officer';
  return '?';
}

// Get the main hidden stem of a branch
function branchMainStem(branchE) {
  const map = [9,5,0,1,4,2,3,5,6,7,4,8];
  return map[branchE];
}

function countElements(pillars) {
  const cnt = [0,0,0,0,0];
  for (const p of pillars) {
    cnt[STEM_ELEMENT[p.h]]++;
    cnt[BRANCH_ELEM[p.e]]++;
  }
  return cnt;
}

function calcDaeunStartAge(year, month, day, gender) {
  const yearStemH = ((year - 4) % 10 + 10) % 10;
  const yangYear = yearStemH % 2 === 0;
  const forward = (gender === 'male') === yangYear;
  const birthDate = new Date(Date.UTC(year, month-1, day));
  let jieqiDates = [];
  for (const y of [year-1, year, year+1]) {
    for (const node of JIEQI_NODES) {
      const d = calcSolarTermDate(y, node.lng);
      jieqiDates.push(new Date(Date.UTC(d.year, d.month-1, d.day)));
    }
  }
  jieqiDates.sort((a, b) => a - b);
  let targetDate;
  if (forward) {
    targetDate = jieqiDates.find(d => d > birthDate);
  } else {
    jieqiDates.reverse();
    targetDate = jieqiDates.find(d => d < birthDate);
  }
  if (!targetDate) return 5;
  const diffDays = Math.abs(targetDate - birthDate) / 86400000;
  return Math.round(diffDays / 3);
}

function getDaeunPillars(monthH, monthE, forward, count) {
  const pillars = [];
  let h = monthH, e = monthE;
  for (let i = 0; i < count; i++) {
    if (forward) { h = (h + 1) % 10; e = (e + 1) % 12; }
    else { h = (h - 1 + 10) % 10; e = (e - 1 + 12) % 12; }
    pillars.push({ h, e });
  }
  return pillars;
}

function calcCompatScore(c1, c2) {
  let score = 50;
  const e1 = STEM_ELEMENT[c1.day.h], e2 = STEM_ELEMENT[c2.day.h];
  if (ELEM_GENERATES[e1] === e2 || ELEM_GENERATES[e2] === e1) score += 20;
  if (e1 === e2) score += 10;
  if (ELEM_CONTROLS[e1] === e2 || ELEM_CONTROLS[e2] === e1) score -= 5;
  const sixHarmony = [[0,1],[2,11],[3,10],[4,9],[5,8],[6,7]];
  for (const [a,b] of sixHarmony) {
    if ((c1.day.e===a && c2.day.e===b)||(c1.day.e===b && c2.day.e===a)) score += 15;
  }
  if ((c1.year.e + c2.year.e) % 12 === 0 || Math.abs(c1.year.e - c2.year.e) === 6) score -= 8;
  return Math.max(0, Math.min(100, score));
}

    return `<div class="pillar-col${isDayPillar ? ' day-pillar' : ''}">
      <div class="pillar-label">${t(item.key)}</div>
      <div class="stem-char" style="color:${stemColor}">${STEMS[p.h]}</div>
      <div class="elem-badge" style="color:${stemColor}">${elemName}</div>
      <div class="branch-char" style="color:${branchColor}">${BRANCHES[p.e]}</div>
      <div class="elem-emoji">${ELEM_EMOJIS[BRANCH_ELEM[p.e]]}</div>
      <div class="yinyang-label">${yy}</div>
      <div class="shishen-label" onclick="window._openApiModal()">${ss}</div>
    </div>`;
  }).join('');
}

function renderRadarSVG(counts) {
  const size = 220, cx = size/2, cy = size/2, r = 75;
  const labels = ELEM_NAMES[AppState.lang];
  const colors = ELEM_COLORS;
  const angles = [90, 162, 234, 306, 18].map(d => (d - 90) * Math.PI / 180);
  const maxVal = Math.max(...counts, 1) * 1.3 || 4;

  function pt(angle, radius) {
    return [cx + radius * Math.cos(angle), cy + radius * Math.sin(angle)];
  }

  let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;margin:0 auto;">`;

  // background levels
  for (let lv = 3; lv >= 1; lv--) {
    const lr = r * lv / 3;
    const pts = angles.map(a => pt(a, lr).join(',')).join(' ');
    svg += `<polygon points="${pts}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;
  }

  // axes
  for (const a of angles) {
    const [x, y] = pt(a, r);
    svg += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`;
  }

  // data polygon
  const dataPts = counts.map((v, i) => pt(angles[i], (v / maxVal) * r).join(',')).join(' ');
  svg += `<polygon points="${dataPts}" fill="rgba(201,168,76,0.2)" stroke="var(--accent-gold)" stroke-width="2"/>`;

  // dots and labels
  counts.forEach((v, i) => {
    const [dx, dy] = pt(angles[i], (v / maxVal) * r);
    svg += `<circle cx="${dx}" cy="${dy}" r="4" fill="${colors[i]}" stroke="#fff" stroke-width="1"/>`;
    const [lx, ly] = pt(angles[i], r + 20);
    svg += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="${colors[i]}" font-size="12" font-weight="700">${ELEM_EMOJIS[i]} ${labels[i]} (${v})</text>`;
  });

  svg += '</svg>';
  document.getElementById('radarChart').innerHTML = svg;
}

function renderDaeunTimeline(chart) {
  const yearStemH = ((chart.birthYear - 4) % 10 + 10) % 10;
  const yangYear = yearStemH % 2 === 0;
  const forward = (chart.gender === 'male') === yangYear;
  const startAge = calcDaeunStartAge(chart.birthYear, chart.birthMonth, chart.birthDay, chart.gender);
  const pillars = getDaeunPillars(chart.month.h, chart.month.e, forward, 8);
  const currentAge = 2026 - chart.birthYear;

  let html = '<div class="daeun-timeline">';
  for (let i = 0; i < pillars.length; i++) {
    const p = pillars[i];
    const age = startAge + i * 10;
    const isCurrent = currentAge >= age && currentAge < age + 10;
    html += `<div class="daeun-block${isCurrent ? ' current' : ''}">
      <div class="age">${age}-${age+9} ${t('ageLabel')}</div>
      <div class="chars" style="color:${getElemColor(p.h)}">${STEMS[p.h]}${BRANCHES[p.e]}</div>
      ${isCurrent ? `<div class="label-current">${t('currentDaeun')}</div>` : ''}
    </div>`;
  }
  html += '</div>';
  // Monetization trigger 3
  html += `<div class="locked-item" onclick="window._openApiModal()"><p>${t('decadeMeaning')}</p></div>`;
  return html;
}

// === SECTION F: UI CONTROLLERS ===
function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = t(key);
    if (val) el.textContent = val;
  });
  // Update select options
  const genderSelect = document.getElementById('inputGender');
  if (genderSelect) {
    genderSelect.options[0].textContent = t('male');
    genderSelect.options[1].textContent = t('female');
  }
  // Re-render chart if present
  if (AppState.chart) {
    renderAll();
  }
}

function renderAll() {
  const chart = AppState.chart;
  if (!chart) return;
  renderPillarGrid(chart);
  renderRadarSVG(countElements([chart.year, chart.month, chart.day, chart.hour]));
  renderDayMasterCard(chart);
  renderUnlockBanner();
  renderTabContent();
  renderAISection(chart);
}

function renderTabContent() {
  const chart = AppState.chart;
  if (!chart) return;
  const el = document.getElementById('tabContent');
  switch (AppState.activeTab) {
    case 'shiShen': el.innerHTML = renderShiShenTab(chart); break;
    case 'daeun': el.innerHTML = renderDaeunTimeline(chart); break;
    case 'saeun': el.innerHTML = renderSaeunTab(chart); break;
    case 'gunghap': el.innerHTML = renderGunghapTab(chart); break;
  }
}

function setupLangToggle() {
  document.getElementById('langToggle').addEventListener('click', (e) => {
    if (e.target.tagName !== 'BUTTON') return;
    const lang = e.target.getAttribute('data-lang');
    if (!lang) return;
    AppState.lang = lang;
    document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    applyI18n();
  });
}

function setupTabs() {
  document.getElementById('tabsBar').addEventListener('click', (e) => {
    if (!e.target.classList.contains('tab-btn')) return;
    const tab = e.target.getAttribute('data-tab');
    AppState.activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderTabContent();
  });
}

function handleCalculate() {
  const year = parseInt(document.getElementById('inputYear').value);
  const month = parseInt(document.getElementById('inputMonth').value);
  const day = parseInt(document.getElementById('inputDay').value);
  const hour = parseInt(document.getElementById('inputHour').value);
  const gender = document.getElementById('inputGender').value;

  if (!year || !month || !day || isNaN(hour)) {
    alert('Please fill in all fields.');
    return;
  }

  const yearP = getYearPillar(year);
  const monthP = getMonthPillar(year, month, day);
  const dayP = getDayPillar(year, month, day);
  const hourP = getHourPillar(hour, dayP.h);

  AppState.chart = {
    year: yearP, month: monthP, day: dayP, hour: hourP,
    birthYear: year, birthMonth: month, birthDay: day, birthHour: hour,
    gender
  };

  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('formSection').style.display = 'none';
  const cs = document.getElementById('chartSection');
  cs.classList.add('show');
  cs.scrollIntoView({ behavior: 'smooth' });

  AppState.activeTab = 'shiShen';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab-btn[data-tab="shiShen"]').classList.add('active');

  renderAll();
}

function handleBack() {
  document.getElementById('chartSection').classList.remove('show');
  document.getElementById('heroSection').style.display = '';
  document.getElementById('formSection').style.display = '';
  AppState.chart = null;
  AppState.aiResult = null;
  AppState.aiUnlocked = false;
}

// MODALS
window._openApiModal = function() {
  const modal = document.getElementById('apiKeyModal');
  modal.classList.add('show');
  const existing = AppState.apiKey || '';
  document.getElementById('apiKeyInput').value = existing;
};

function closeApiModal() {
  document.getElementById('apiKeyModal').classList.remove('show');
}

async function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  AppState.apiKey = key;
  localStorage.setItem('fp_apikey', key);
  AppState.aiUnlocked = true;
  closeApiModal();
  renderUnlockBanner();

  if (AppState.chart) {
    const aiEl = document.getElementById('aiSection');
    aiEl.innerHTML = '<div class="ai-section" style="text-align:center;padding:40px;"><p style="color:var(--accent-gold);">Loading AI analysis...</p></div>';
    try {
      const result = await callClaude(key, AppState.chart);
      AppState.aiResult = result;
      renderAISection(AppState.chart);
    } catch (err) {
      aiEl.innerHTML = `<div class="ai-section" style="text-align:center;padding:20px;"><p style="color:var(--fire);">Error: ${err.message}</p><p style="color:var(--text-muted);font-size:12px;margin-top:8px;">Please check your API key and try again.</p></div>`;
    }
  }
}

// SHARE
function handleShare() {
  if (!AppState.chart) return;
  const c = AppState.chart;
  const url = `${window.location.origin}${window.location.pathname}?y=${c.birthYear}&m=${c.birthMonth}&d=${c.birthDay}&h=${c.birthHour}&g=${c.gender}`;
  document.getElementById('shareUrl').value = url;
  document.getElementById('shareModal').classList.add('show');
}

function closeShareModal() {
  document.getElementById('shareModal').classList.remove('show');
}

function copyShareUrl() {
  const input = document.getElementById('shareUrl');
  input.select();
  document.execCommand('copy');
  alert('Copied!');
}

// COMPAT
window._calcCompat = function() {
  const y = parseInt(document.getElementById('partnerYear').value);
  const m = parseInt(document.getElementById('partnerMonth').value);
  const d = parseInt(document.getElementById('partnerDay').value);
  const h = parseInt(document.getElementById('partnerHour').value);
  if (!y || !m || !d || isNaN(h)) { alert('Please fill in all fields.'); return; }
  const chart2 = {
    year: getYearPillar(y), month: getMonthPillar(y, m, d),
    day: getDayPillar(y, m, d), hour: getHourPillar(h, getDayPillar(y, m, d).h)
  };
  const score = calcCompatScore(AppState.chart, chart2);
  const el = document.getElementById('compatResult');
  el.innerHTML = `<div style="margin-top:16px;">
    <div class="compat-score-circle">${score}</div>
    <p style="color:var(--text-muted);font-size:13px;">${t('compatScore')}: ${score}/100</p>
    <p style="font-size:13px;color:var(--text-primary);margin-top:8px;">
      ${STEMS[AppState.chart.day.h]}${BRANCHES[AppState.chart.day.e]} + ${STEMS[chart2.day.h]}${BRANCHES[chart2.day.e]}
    </p>
  </div>`;
};

// === SECTION H: BOOTSTRAP ===
function init() {
  setupLangToggle();
  setupTabs();

  document.getElementById('btnCalc').addEventListener('click', handleCalculate);
  document.getElementById('btnBack').addEventListener('click', handleBack);
  document.getElementById('apiKeyCancel').addEventListener('click', closeApiModal);
  document.getElementById('apiKeySave').addEventListener('click', saveApiKey);
  document.getElementById('btnShare').addEventListener('click', handleShare);
  document.getElementById('shareClose').addEventListener('click', closeShareModal);
  document.getElementById('shareCopy').addEventListener('click', copyShareUrl);
  document.getElementById('btnAbout').addEventListener('click', () => {
    alert('Four Pillars Oracle - Ancient wisdom for modern life.\nBased on traditional \uC0AC\uC8FC\uBA85\uB9AC (Four Pillars of Destiny).');
  });

  // Check for existing API key
  if (AppState.apiKey) {
    AppState.aiUnlocked = true;
  }

  // Check URL params
  const params = new URLSearchParams(window.location.search);
  if (params.get('y')) {
    document.getElementById('inputYear').value = params.get('y');
    document.getElementById('inputMonth').value = params.get('m');
    document.getElementById('inputDay').value = params.get('d');
    document.getElementById('inputHour').value = params.get('h');
    if (params.get('g')) document.getElementById('inputGender').value = params.get('g');
  }

  applyI18n();
}

document.addEventListener('DOMContentLoaded', init);
</script>
